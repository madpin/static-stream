name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.1.9
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  macos:
    name: Sign, notarize, and publish macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -nE 's/^version = "([^"]+)"$/\1/p' Cargo.toml | head -1)"
          if [[ "$RELEASE_TAG" != "v$VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match Cargo version $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-universal

      - name: Validate required release secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROVISIONING_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          CAMERA_PROVISIONING_PROFILE: ${{ secrets.CAMERA_PROVISIONING_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_TEAM_ID \
            APP_PROVISIONING_PROFILE \
            CAMERA_PROVISIONING_PROFILE \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            fi
          done

      - name: Import Apple signing assets
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APP_PROVISIONING_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          CAMERA_PROVISIONING_PROFILE: ${{ secrets.CAMERA_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/static-stream-signing.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/static-stream-certificate.p12"
          APP_PROFILE="$RUNNER_TEMP/static-stream-app.provisionprofile"
          CAMERA_PROFILE="$RUNNER_TEMP/static-stream-camera.provisionprofile"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE"
          printf '%s' "$APP_PROVISIONING_PROFILE" | base64 --decode > "$APP_PROFILE"
          printf '%s' "$CAMERA_PROVISIONING_PROFILE" | base64 --decode > "$CAMERA_PROFILE"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

          IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN" \
              | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' \
              | head -1
          )"
          if [[ -z "$IDENTITY" ]]; then
            echo "The certificate does not contain a Developer ID Application identity" >&2
            exit 1
          fi
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"
          echo "app_profile=$APP_PROFILE" >> "$GITHUB_OUTPUT"
          echo "camera_profile=$CAMERA_PROFILE" >> "$GITHUB_OUTPUT"
          rm -f "$CERTIFICATE"

      - name: Test
        run: ./scripts/check.sh

      - name: Build signed universal app
        env:
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          TEAM_IDENTIFIER_PREFIX: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROVISIONING_PROFILE: ${{ steps.signing.outputs.app_profile }}
          CAMERA_PROVISIONING_PROFILE: ${{ steps.signing.outputs.camera_profile }}
          RELEASE_SIGNING: "1"
        run: ./scripts/build-macos.sh

      - name: Notarize and staple app
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          APP="dist/Static Stream.app"
          NOTARY_ARCHIVE="$RUNNER_TEMP/static-stream-notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$NOTARY_ARCHIVE"
          xcrun notarytool submit "$NOTARY_ARCHIVE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=2 "$APP"

      - name: Package release artifacts
        id: artifacts
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          APP="dist/Static Stream.app"
          ZIP="dist/Static-Stream-${VERSION}-macos-universal.zip"
          DMG="dist/Static-Stream-${VERSION}-macos-universal.dmg"
          STAGING="$RUNNER_TEMP/static-stream-dmg"

          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Static Stream.app"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Static Stream" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG"
          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          SHA256="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOWNLOAD_URL="https://github.com/madpin/static-stream/releases/download/${RELEASE_TAG}/$(basename "$ZIP")"
          cat > dist/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See the GitHub release notes for changes in Static Stream $VERSION.",
            "pub_date": "$PUB_DATE",
            "url": "$DOWNLOAD_URL",
            "sha256": "$SHA256"
          }
          EOF

          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Static Stream ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.zip }}
            dist/latest.json

      - name: Remove temporary signing keychain
        if: always()
        shell: bash
        env:
          KEYCHAIN: ${{ steps.signing.outputs.keychain }}
        run: |
          if [[ -n "${KEYCHAIN:-}" && -f "$KEYCHAIN" ]]; then
            security delete-keychain "$KEYCHAIN"
          fi
